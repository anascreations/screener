server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: native
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: >
      text/html,
      text/xml,
      text/plain,
      text/css,
      application/javascript,
      application/json

spring:
  application:
    name: screener-service

  datasource:
    # Absolute path — avoids writing to unpredictable working directory.
    # /app/data is created in Dockerfile with correct permissions.
    # NOTE: Render free tier has ephemeral storage — data is wiped on redeploy.
    url: jdbc:h2:file:/app/data/screener-db;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  h2:
    console:
      # Disable in production — H2 console has no auth by default
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console

  threads:
    virtual:
      enabled: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: true
    encoding: UTF-8
    mode: HTML

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

screener:
  # Reads SCREENER_BASE_URL env var — set this in Render dashboard to your
  # actual service URL: https://your-app-name.onrender.com
  # Falls back to localhost for local development.
  api:
    base-url: ${SCREENER_BASE_URL:http://localhost:8080}

  min-score: 65
  min-volume-ratio: 1.3
  history-days: 252
  scan-parallelism: 3
  delay-between-stocks-ms: 800
  yahoo:
    max-retries: 3
    delay-min-ms: 600
    delay-max-ms: 1400
  extra-holidays: "2026-02-03,2026-03-20,2026-03-21,2026-05-23,2026-05-27"

  us:
    min-score: 70
    min-volume-ratio: 1.5
    history-days: 252
    scan-parallelism: 3
    delay-between-stocks-ms: 800
    yahoo:
      max-retries: 3
      delay-min-ms: 600
      delay-max-ms: 1400

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    com.screener.service: DEBUG
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: WARN
  file:
    name: ${LOG_PATH:/app/logs}/screener-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 20