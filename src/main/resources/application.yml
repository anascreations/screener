server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: native
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: >
      text/html,
      text/xml,
      text/plain,
      text/css,
      application/javascript,
      application/json

spring:
  application:
    name: screener-service

  datasource:
    url: jdbc:h2:file:./data/screener-db
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  threads:
    virtual:
      enabled: true

  # ── Thymeleaf ─────────────────────────────────────────────────────────────
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: true          # set true in production
    encoding: UTF-8
    mode: HTML

  # ── Multipart (Level-2 image upload) ─────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

screener:
  api:
    base-url: http://localhost:8080   # WebClient target — change if API is on separate host

  min-score: 65
  min-volume-ratio: 1.3
  history-days: 252
  scan-parallelism: 3
  delay-between-stocks-ms: 800
  yahoo:
    max-retries: 3
    delay-min-ms: 600
    delay-max-ms: 1400
  extra-holidays: "2026-02-03,2026-03-20,2026-03-21,2026-05-23,2026-05-27"

  us:
    min-score: 70
    min-volume-ratio: 1.5
    history-days: 252
    scan-parallelism: 3
    delay-between-stocks-ms: 800
    yahoo:
      max-retries: 3
      delay-min-ms: 600
      delay-max-ms: 1400

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    com.screener.service: DEBUG
    org.hibernate.SQL: WARN
    com.zaxxer.hikari: WARN
  file:
    name: ${LOG_PATH:/app/logs}/screener-service.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 20